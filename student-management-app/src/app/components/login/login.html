<div class="d-flex justify-content-center align-items-center" style="height:80vh;">
  <div class="card p-4" style="width:100%; max-width:400px;">
    <h2 class="mb-4 text-center">Login</h2>
    <div class="mb-3">
      <label class="form-label">Username</label>
      <input [(ngModel)]="username" class="form-control" placeholder="Enter username">
    </div>
    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" [(ngModel)]="password" class="form-control" placeholder="Enter password">
    </div>
    <div class="mb-3">
      <label class="form-label">Role</label>
      <select [(ngModel)]="role" class="form-select">
        <option value="admin">Admin</option>
        <option value="staff">Staff</option>
      </select>
    </div>
    <button (click)="login()" class="btn btn-primary w-100">Login</button>
  </div>
</div>
